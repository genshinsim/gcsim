  - bite: skill(Sharky's Bite Base DMG)
  - momentumBonus: skill(Wave Momentum DMG Bonus)
  - surgingBite: skill(Sharky's Surging Bite Additional DMG Bonus)

  - burst: burst(Skill DMG)

