abilities:
  - name: attack
    params:
      travel: Projectile travel time for Shark Missiles. Default 10 frames.
    hitbox:
      - name: N1
        shape: Circle
        center: PrimaryTarget
        radius: 0.7

      - name: N2
        shape: Circle
        center: PrimaryTarget
        radius: 0.7

      - name: N3
        shape: Circle
        center: PrimaryTarget
        radius: 0.7

      - name: Shark-Bite
        note: Spawns on the Primary Target.
        shape: Single
        center: GlobalValue

      - name: Surging-Bite
        note: Spawns on the Primary Target.
        shape: Single
        center: GlobalValue

  - name: charge
    hitbox:
      - name: CA
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 3.5

  - name: skill
    hitbox:
      - name: Surfing
        shape: Box
        center: Player
        offset: [0, 0.9]
        box: [0, 1]
        hitlag: {scale: 0.01, defense_halt: true, deployable: true}

  - name: burst
    params:
      travel: Projectile travel time for the Super Shark Missile. Default 70 frames.
    hitbox:
      - name: Q
        shape: Circle
        center: PrimaryTarget
        radius: 5
