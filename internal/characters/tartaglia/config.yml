abilities:
  - name: attack
    params:
      travel: Projectile travel time. Default 10 frames.
    hitbox:
      - name: N1
        shape: Box
        center: PrimaryTarget
        offset: [0, -0.5]
        box: [0.1, 1]
        hitlag: {deployable: true}

      - name: N2
        shape: Box
        center: PrimaryTarget
        offset: [0, -0.5]
        box: [0.1, 1]
        hitlag: {deployable: true}

      - name: N3
        shape: Box
        center: PrimaryTarget
        offset: [0, -0.5]
        box: [0.1, 1]
        hitlag: {deployable: true}

      - name: N4
        shape: Box
        center: PrimaryTarget
        offset: [0, -0.5]
        box: [0.1, 1]
        hitlag: {deployable: true}

      - name: N5
        shape: Box
        center: PrimaryTarget
        offset: [0, -0.5]
        box: [0.1, 1]
        hitlag: {deployable: true}

      - name: N6
        shape: Box
        center: PrimaryTarget
        offset: [0, -0.5]
        box: [0.1, 1]
        hitlag: {deployable: true}

      - name: E-N1
        shape: Circle
        center: Player
        offset: [0, 0.8]
        fan_angle: 300
        radius: 1.8
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: E-N2
        shape: Circle
        center: Player
        offset: [0, 0.8]
        fan_angle: 270
        radius: 1.8
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: E-N3
        shape: Circle
        center: Player
        offset: [0, 0.6]
        fan_angle: 300
        radius: 2
        hitlag: {time: 0.06, scale: 0.01, defense_halt: true}

      - name: E-N4
        shape: Circle
        center: Player
        offset: [0, 0.9]
        fan_angle: 300
        radius: 2
        hitlag: {time: 0.06, scale: 0.01, defense_halt: true}

      - name: E-N5
        shape: Circle
        center: Player
        offset: [0, 0.6]
        radius: 2.2
        hitlag: {time: 0.06, scale: 0.01, defense_halt: true}

      - name: E-N6-1
        shape: Box
        center: Player
        offset: [0, 0.3]
        box: [2, 3.2]
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: E-N6-2
        shape: Circle
        center: Player
        offset: [0, 1.5]
        radius: 2.2
        hitlag: {time: 0.12, scale: 0.01, defense_halt: true}

      - name: RiptideBurst
        note: Spawns on targets affected Riptide on death.
        shape: Circle
        center: Player
        radius: 5

  - name: aim
    note: Only available if not in skill state.
    params:
      hold: 0 for Physical Aimed Shot, 1 for Fully-Charged Aimed Shot (default).
      travel: Projectile travel time. Default 10 frames.
      weakspot: Hit weakspot with aimed shot. Default 0 (false), 1 for true.
    hitbox:
      - name: Aim
        shape: Box
        center: PrimaryTarget
        offset: [0, -0.5]
        box: [0.1, 1]

      - name: Aim-Head
        shape: Box
        center: PrimaryTarget
        offset: [0, -0.5]
        box: [0.1, 1]
        hitlag: {time: 0.12, scale: 0.01, deployable: true}

      - name: FullAim
        shape: Box
        center: PrimaryTarget
        offset: [0, -0.5]
        box: [0.1, 1]

      - name: FullAim-Head
        shape: Box
        center: PrimaryTarget
        offset: [0, -0.5]
        box: [0.1, 1]
        hitlag: {time: 0.12, scale: 0.01, deployable: true}

      - name: RiptideFlash-Range
        note: Spawns on target affected by Riptide that was hit by FullAim.
        shape: Circle
        center: GlobalValue
        radius: 3

  - name: charge
    note: Only available if in skill state. Need to use attack right before charge.
    params:
      hitWeakPoint: Hit weakspot for Charge Attack in Melee mode. Default 0 (false), 1 for true.
    hitbox:
      - name: E-CA-1
        shape: Circle
        center: Player
        radius: 2.2

      - name: E-CA-2
        shape: Circle
        center: Player
        radius: 2.2

  - name: skill
    hitbox:
      - name: E-StanceChange
        shape: Circle
        center: Player
        radius: 3

      - name: RiptideSlash-Melee
        note: Spawns on target affected by Riptide that was hit by a NA in E.
        shape: Circle
        center: GlobalValue
        radius: 3

  - name: burst
    hitbox:
      - name: Q-Melee
        shape: Circle
        center: Player
        radius: 8

      - name: Q-Ranged
        shape: Circle
        center: PrimaryTarget
        radius: 6

      - name: RiptideBlast
        note: Spawns on all enemies affected by Riptide that were hit by Q-Melee.
        shape: Circle
        center: GlobalValue
        radius: 5

  - name: cons
    hitbox:
      - name: RiptideFlash-C4
        note: Spawns on all enemies affected by Riptide.
        shape: Circle
        center: GlobalValue
        radius: 3

  - name: walk
    note: Only aim followed by walk and walk followed by skill have proper frames.
