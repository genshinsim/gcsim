use: pipeline
kind: character
name: tartaglia

shortcuts:
  - childe

combat:
  icd_tags:
    - TartagliaRiptideFlash

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - attack(4-Hit DMG)
      - attack(5-Hit DMG)
      - attack(6-Hit DMG)
  - aim: attack(Aimed Shot)
  - fullaim: attack(Fully-Charged Aimed Shot)
  - rtFlash: attack(Riptide Flash DMG)
  - rtBurst: attack(Riptide Burst DMG)

  - skill: skill(Stance Change DMG)
  - attackE:
      - skill(1-Hit DMG)
      - skill(2-Hit DMG)
      - skill(3-Hit DMG)
      - skill(4-Hit DMG)
      - skill(5-Hit DMG)
      - - skill(6-Hit DMG)
        - skill(6-Hit DMG|1)
  - eCharge:
      - skill(Charged Attack DMG)
      - skill(Charged Attack DMG|1)
  - rtSlash: skill(Charged Attack DMG)

  - meleeBurst: 'burst(Skill DMG: Melee)'
  - rtBlast: burst(Riptide Blast DMG)
  - burst: 'burst(Skill DMG: Ranged)'

