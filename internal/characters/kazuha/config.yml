abilities:
  - name: attack
    hitbox:
      - name: N1
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 1.5
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: N2
        shape: Circle
        center: Player
        offset: [0, 0.7]
        radius: 1.5
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: N3-1
        shape: Circle
        center: Player
        offset: [0, 0.8]
        radius: 1.5
        hitlag: {time: 0.01, scale: 0.01}

      - name: N3-2
        shape: Circle
        center: Player
        offset: [0, 0.7]
        radius: 1.5
        hitlag: {time: 0.05, scale: 0.01, defense_halt: true}

      - name: N4
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 1.5
        hitlag: {time: 0.06, scale: 0.01, defense_halt: true}

      - name: N5-1
        shape: Circle
        center: Player
        radius: 2.2
        hitlag: {scale: 0.05, defense_halt: true}

      - name: N5-2
        shape: Circle
        center: Player
        radius: 2.2

      - name: N5-3
        shape: Circle
        center: Player
        radius: 2.2
        hitlag: {scale: 0.05, defense_halt: true}

  - name: charge
    note: Need to use attack right before charge.
    hitbox:
      - name: CA-1
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 2.2

      - name: CA-2
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 2.2

  - name: plunge
    hitbox:
      - name: Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 1

      - name: Low_Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 3

      - name: High_Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 5

      - name: E-Plunge
        shape: Circle
        center: Player
        radius: 1

      - name: E-High_Plunge
        shape: Circle
        center: Player
        offset: [0, 0.5]
        radius: 4.5

  - name: low_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: high_plunge
    note: Previous action must be skill or a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: skill
    params:
      glide_cancel: 0 for no Glide Cancel (default), 1 for Glide Cancel. Using high_plunge after Skill with a Glide Cancel is not allowed.
      hold: 0 for Tap (default), 1 for Hold.
    hitbox:
      - name: E-Tap
        note: AbsorbCheck has the same hitbox.
        shape: Circle
        center: Player
        radius: 5

      - name: E-Hold
        note: AbsorbCheck has the same hitbox.
        shape: Circle
        center: Player
        radius: 9

  - name: burst
    hitbox:
      - name: Q-Initial
        note: AbsorbCheck has the same hitbox except that it is 8m radius.
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 9
        hitlag: {time: 0.05, scale: 0.05}

      - name: Q-DoT
        note: Spawns at the Q-Initial position.
        shape: Circle
        center: Player
        radius: 9

      - name: Q-AdditionalElement
        note: Spawns at the Q-Initial position.
        shape: Circle
        center: Player
        radius: 9

  - name: asc
    hitbox:
      - name: E-A1
        shape: Circle
        center: Player
        offset: [0, 0.5]
        radius: 4.5

  - name: walk
    note: No action followed by walk (except low_plunge and high_plunge) has proper frames.
