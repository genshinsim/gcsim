use: pipeline
kind: character
name: kaedeharakazuha

shortcuts:
  - kaz
  - kazuha

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - - attack(3-Hit DMG)
        - attack(3-Hit DMG|1)
      - attack(4-Hit DMG)
      - - attack(5-Hit DMG)
        - attack(5-Hit DMG)
        - attack(5-Hit DMG)
  - charge:
      - attack(Charged Attack DMG)
      - attack(Charged Attack DMG|1)
  - collision: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)

  - skill: skill(Press Skill DMG)
  - skillHold: skill(Hold Skill DMG)

  - burstSlash: burst(Slashing DMG)
  - burstDot: burst(DoT)
  - burstEleDot: burst(Additional Elemental DMG)

