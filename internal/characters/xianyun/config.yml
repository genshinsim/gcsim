use: pipeline
kind: character
name: xianyun

shortcuts:
  - cloudretainer
  - liuyun

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - attack(4-Hit DMG)
  - charged: attack(Charged Attack DMG)
  - collision: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)

  - skillPress: skill(Skill DMG)
  - leap:
      - skill(Driftcloud Wave DMG)
      - skill(Driftcloud Wave DMG|1)
      - skill(Driftcloud Wave DMG|2)

  - burst: burst(Skill DMG)
  - burstDot: burst(Starwicker DMG)
  - healInstantFlat: burst(Healing|1)
  - healInstantP: burst(Healing)
  - healDotFlat: burst(Continuous Healing|1)
  - healDotP: burst(Continuous Healing)

