abilities:
  - name: attack
    params:
      travel: Projectile travel time. Default 10 frames.
    hitbox:
      - name: N1
        shape: Circle
        center: PrimaryTarget
        radius: 0.8

      - name: N2
        shape: Circle
        center: PrimaryTarget
        radius: 0.8

      - name: N3
        shape: Circle
        center: PrimaryTarget
        radius: 0.8

      - name: N4
        shape: Circle
        center: PrimaryTarget
        radius: 1

  - name: charge
    params:
      travel: Projectile travel time. Default 10 frames.
    hitbox:
      - name: CA
        note: This is an approximation because the projectile does single target damage to every enemy it collides with on the path.
        shape: Circle
        center: PrimaryTarget
        radius: 3

  - name: plunge
    hitbox:
      - name: Plunge
        shape: Circle
        center: Player
        radius: 1.5

      - name: Low_Plunge
        shape: Circle
        center: Player
        radius: 3

      - name: High_Plunge
        shape: Circle
        center: Player
        radius: 3.5

  - name: low_plunge
    note: Previous action must be jump buffed via Xianyun's burst for example or must be still in Cloud Transmogrification state (Xianyun E).
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: high_plunge
    note: Previous action must be jump buffed via Xianyun's burst for example or must be still in Cloud Transmogrification state (Xianyun E).
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: skill
    hitbox:
      - name: E
        note: This is an approximation because we do not simulate E damage triggering on collision between character model and enemy.
        shape: Circle
        center: Player
        radius: 1.5

      - name: E-Plunge
        shape: Circle
        center: Player
        radius: 4

      - name: EE-Plunge
        shape: Circle
        center: Player
        radius: 5

      - name: EEE-Plunge
        shape: Circle
        center: Player
        radius: 6.5

  - name: burst
    hitbox:
      - name: Q-Initial
        shape: Circle
        center: Player
        radius: 7

      - name: Q-Starwicker
        shape: Circle
        center: Player
        radius: 4.8
