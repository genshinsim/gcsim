use: pipeline
kind: character
name: lynette

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - - attack(3-Hit DMG)
        - attack(3-Hit DMG|1)
      - attack(4-Hit DMG)
  - charge:
      - attack(Charged Attack DMG)
      - attack(Charged Attack DMG|1)
  - collision: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)

  - skill: skill(Enigma Thrust DMG)
  - skillAligned: skill(Surging Blade DMG)

  - burst: burst(Skill DMG)
  - bogglecat: burst(Bogglecat Box DMG)
  - vivid: burst(Vivid Shot DMG)

