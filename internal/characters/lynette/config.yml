abilities:
  - name: attack
    hitbox:
      - name: N1
        shape: Circle
        center: Player
        offset: [0, 0.3]
        radius: 2
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: N2
        shape: Box
        center: Player
        offset: [0, -0.3]
        box: [1.8, 2.8]
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: N3-1
        shape: Box
        center: Player
        box: [1.5, 2.5]
        hitlag: {time: 0.06, scale: 0.01, defense_halt: true}

      - name: N3-2
        shape: Box
        center: Player
        box: [1.5, 2.5]

      - name: N4
        shape: Box
        center: Player
        box: [2.2, 2.5]

  - name: charge
    note: Need to use attack right before charge.
    hitbox:
      - name: CA-1
        shape: Circle
        center: Player
        offset: [0, 0.8]
        radius: 2.2

      - name: CA-2
        shape: Circle
        center: Player
        offset: [0, 0.8]
        radius: 2.2

  - name: plunge
    hitbox:
      - name: Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 1

      - name: Low_Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 3

      - name: High_Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 5

  - name: low_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: high_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: skill
    params:
      hold: 0 for Tap (default), value between 1 and 150 for Hold. The number determines the E duration in frames.
    hitbox:
      - name: E-Tap
        shape: Box
        center: Player
        offset: [0, -0.5]
        box: [1.8, 4.5]
        hitlag: {scale: 0.01, defense_halt: true}

      - name: E-Hold
        note: Spawns at the closest enemy in 8m radius around the player.
        shape: Box
        center: Player
        offset: [0, -0.5]
        box: [1.8, 5]
        hitlag: {scale: 0.01, defense_halt: true}

      - name: E-Aligned
        note: Spawns on the first enemy hit by E.
        shape: Box
        center: GlobalValue
        offset: [0, -0.3]
        box: [1.2, 4.5]
        hitlag: {scale: 0.01, defense_halt: true}

  - name: burst
    params:
      vivid_travel: Projectile travel time for Vivid Shots. Default 15 frames.
    hitbox:
      - name: Q-Initial
        note: 'Q spawns at Y: 1.8m offset from the player position.'
        shape: Circle
        center: Player
        offset: [0, 1.5]
        radius: 4.5

      - name: Q-Bogglecat
        note: Spawns on the Q position. Absorbs an element either by getting hit or the absorb check with 0.48m radius around the Q position that happens every 0.3s.
        shape: Circle
        center: GlobalValue
        radius: 6

      - name: Q-VividShot
        note: Spawns on a random enemy within 15m radius of the Q position.
        shape: Circle
        center: GlobalValue
        radius: 1
