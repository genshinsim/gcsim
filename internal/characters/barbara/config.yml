use: pipeline
kind: character
name: barbara

shortcuts:
  - barb

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - attack(4-Hit DMG)
  - charge: attack(Charged Attack DMG)
  - collision: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)

  - skillhpp: skill(Continuous Regeneration)
  - skillhp: skill(Continuous Regeneration|1)
  - prochpp: skill(HP Regeneration Per Hit)
  - prochp: skill(HP Regeneration Per Hit|1)
  - skill: skill(Droplet DMG)

  - bursthpp: burst(Regeneration)
  - bursthp: burst(Regeneration|1)

