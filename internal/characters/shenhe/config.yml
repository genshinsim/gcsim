use: pipeline
kind: character
name: shenhe

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - - attack(4-Hit DMG)
        - attack(4-Hit DMG)
      - attack(5-Hit DMG)
  - charged: attack(Charged Attack DMG)

  - skillPress: skill(Press Skill DMG)
  - skillHold: skill(Hold Skill DMG)
  - skillpp: skill(DMG Bonus)

  - burst: burst(Skill DMG)
  - burstrespp: burst(RES Decrease)
  - burstdot: burst(DoT)

