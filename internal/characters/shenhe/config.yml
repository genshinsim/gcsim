abilities:
  - name: attack
    hitbox:
      - name: N1
        shape: Circle
        center: Player
        offset: [0, 0.5]
        fan_angle: 270
        radius: 2.5
        hitlag: {time: 0.02, scale: 0.01, defense_halt: true}

      - name: N2
        shape: Circle
        center: Player
        offset: [0, 0.5]
        fan_angle: 270
        radius: 2.5
        hitlag: {time: 0.02, scale: 0.01, defense_halt: true}

      - name: N3
        shape: Circle
        center: Player
        offset: [0, 0.5]
        radius: 2.5
        hitlag: {time: 0.02, scale: 0.01, defense_halt: true}

      - name: N4-1
        shape: Box
        center: Player
        box: [2.2, 3.6]

      - name: N4-2
        shape: Box
        center: Player
        box: [2.2, 3.6]
        hitlag: {time: 0.02, scale: 0.01, defense_halt: true}

      - name: N5
        shape: Circle
        center: Player
        offset: [0, 0.5]
        radius: 3
        hitlag: {time: 0.1, scale: 0.01, defense_halt: true}

  - name: charge
    note: Need to use attack right before charge.
    hitbox:
      - name: CA
        shape: Circle
        center: PrimaryTarget
        radius: 0.8
        hitlag: {scale: 0.01, defense_halt: true, deployable: true}

  - name: skill
    params:
      hold: 0 for Tap (default), 1 for Hold.
    hitbox:
      - name: E-Tap
        shape: Circle
        center: PrimaryTarget
        radius: 0.8
        hitlag: {scale: 0.01, defense_halt: true, deployable: true}

      - name: E-Hold
        shape: Circle
        center: Player
        offset: [0, 1.5]
        radius: 4

  - name: burst
    hitbox:
      - name: Q-ElementalBurst
        note: Q/A1/C2 have a detection area with the same hitbox.
        shape: Circle
        center: Player
        offset: [0, 2]
        fan_angle: 120
        radius: 8

      - name: Q-DoT
        shape: Circle
        center: Player
        radius: 7

  - name: walk
    note: Everything except normal followed by walk has proper frames.
