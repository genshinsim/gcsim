use: pipeline
kind: character
name: aethergeo

override:
  id: 10000005
  depot: 506

docs:
  frames:
    - count: https://docs.google.com/spreadsheets/d/186FpS4ckDENVY4U60xxgevJZj_vdyYWZroIa7P_yDr4/edit?usp=sharing
      count_credit: Kolibri#7675
      video: https://youtu.be/2LnpQIVIszY
      video_credit: Kolibri#7675
    - count: https://docs.google.com/spreadsheets/d/1I81WBTsNgyBG8Z9eYjHBSVAn-dGk-dkBIoib5Yp4e4M/edit?usp=sharing
      count_credit: Kolibri#7675
      video: https://youtu.be/VbmlHb5dPqg
      video_credit: Kolibri#7675

abilities:
  - name: default
    params:
      base_atk_buff: 0 for no +3 base atk, 1 (default) for +3 base atk. Set via '+params=[base_atk_buff=...]' in the char's line.
      skirk_story_buff: 0 for no buffs, 1 (default) for +7 base atk, +15 EM, +50 base HP. Set via '+params=[skirk_story_buff=...]' in the char's line.

  - name: attack
    hitbox:
      - name: N1
        shape: Box
        center: Player
        box: [1.4, 2.2]
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: N2
        shape: Circle
        center: Player
        offset: [0, 0.6]
        fan_angle: 180
        radius: 1.7
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: N3
        shape: Box
        center: Player
        offset: [0, 0.4]
        box: [1.5, 2.2]
        hitlag: {time: 0.06, scale: 0.01, defense_halt: true}

      - name: N4
        shape: Circle
        center: Player
        offset: [0, 0.6]
        radius: 1.7
        hitlag: {time: 0.09, scale: 0.01, defense_halt: true}

      - name: N5
        shape: Circle
        center: Player
        offset: [0, 0.6]
        fan_angle: 240
        radius: 1.75
        hitlag: {time: 0.12, scale: 0.01, defense_halt: true}

  - name: charge
    note: Need to use attack right before charge.
    hitbox:
      - name: CA-1
        shape: Circle
        center: Player
        radius: 2.2

      - name: CA-2
        shape: Circle
        center: Player
        radius: 2.2

  - name: skill
    params:
      no_meteorite: If 1, no meteorite will be created. Default 0.
      short_hold: 0 for Tap (default), 1 for Short Hold. The Short Hold version is the shortest possible Hold.
    hitbox:
      - name: E-Skill
        shape: Circle
        center: PrimaryTarget
        radius: 3
        hitlag: {time: 0.05, scale: 0.05, defense_halt: true, deployable: true}

  - name: burst
    params:
      construct_limit: Number of Stone Walls to spawn. Default 4. Using a value < 4 starts not spawning Stone Walls starting from top left going counterclockwise.
      hits: Number of shockwave attacks to perform. Default 4.
    hitbox:
      - name: Q-Shockwave
        note: C1 has a detection area of 7m around the position of this hitbox.
        shape: Circle
        center: Player
        radius: 6

  - name: asc
    hitbox:
      - name: A4
        shape: Circle
        center: Player
        offset: [0, 1.2]
        radius: 2.4

  - name: cons
    hitbox:
      - name: C2
        note: Spawns at the E-Skill position.
        shape: Circle
        center: GlobalValue
        radius: 3
        hitlag: {time: 0.05, scale: 0.05, defense_halt: true, deployable: true}

  - name: walk
    note: No action followed by walk has proper frames.
