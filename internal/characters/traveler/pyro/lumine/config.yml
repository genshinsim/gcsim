use: pipeline
kind: character
name: luminepyro

override:
  id: 10000007
  depot: 702

shortcuts:
  - travelerpyro

docs:
  frames:
    - count: https://docs.google.com/spreadsheets/d/1S7cJszsMoQF6ShCvA7hMjiXMuOCoDRwgW1rseP0uC8k/edit?usp=sharing
      count_credit: Kolibri#7675
      video: https://youtu.be/VaIaa4MW9eI
      video_credit: Kolibri#7675
    - count: https://docs.google.com/spreadsheets/d/1H-AkUNbvgXf4gkk6vUGZXieEVNV72mvmBnDAkFyEbhI/edit?usp=sharing
      count_credit: caramielle.
      video: https://youtu.be/6XFg2SarYAY
      video_credit: charliex3000

abilities:
  - name: default
    params:
      base_atk_buff: 0 for no +3 base atk, 1 (default) for +3 base atk. Set via '+params=[base_atk_buff=...]' in the char's line.
      skirk_story_buff: 0 for no buffs, 1 (default) for +7 base atk, +15 EM, +50 base HP. Set via '+params=[skirk_story_buff=...]' in the char's line.

  - name: attack
    hitbox:
      - name: N1
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 1.6
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: N2
        shape: Box
        center: Player
        box: [1.4, 2.2]
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: N3
        shape: Circle
        center: Player
        offset: [0, 0.7]
        radius: 1.5
        hitlag: {time: 0.06, scale: 0.01, defense_halt: true}

      - name: N4
        shape: Circle
        center: Player
        offset: [0, 0.7]
        radius: 1.5
        hitlag: {time: 0.06, scale: 0.01, defense_halt: true}

      - name: N5
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 1.6
        hitlag: {time: 0.1, scale: 0.01, defense_halt: true}

  - name: charge
    note: Need to use attack right before charge.
    hitbox:
      - name: CA-1
        shape: Circle
        center: Player
        radius: 2.2

      - name: CA-2
        shape: Circle
        center: Player
        radius: 2.2

  - name: plunge
    hitbox:
      - name: Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 1

      - name: Low_Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 3

      - name: High_Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 5

  - name: low_plunge
    note: Only available for Lumine. Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: high_plunge
    note: Only available for Lumine. Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: skill
    params:
      hold: 0 for Blazing Threshold; 1 for Scorching Threshold. Default 0.
    hitbox:
      - name: E Hold DMG
        shape: Circle
        center: PrimaryTarget
        radius: 3

      - name: E Scorching Threshold
        shape: Circle
        center: PrimaryTarget
        radius: 1.5

      - name: E Blazing Threshold
        shape: Circle
        center: PrimaryTarget
        radius: 0.5

      - name: E Scorching Threshold (A1)
        shape: Circle
        center: PrimaryTarget
        radius: 4

      - name: E Blazing Threshold (A1)
        shape: Circle
        center: PrimaryTarget
        radius: 3

  - name: burst
    hitbox:
      - name: Q
        shape: Circle
        center: Player
        radius: 4.5

  - name: walk
    note: Only skill and burst followed by walk have proper frames.
