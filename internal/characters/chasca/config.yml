abilities:
  - name: attack
    params:
      travel: Projectile travel time. Default 10 frames.
    hitbox:
      - name: N1
        shape: Box
        center: PrimaryTarget
        offset: [0, -0.5]
        box: [0.1, 1]

      - name: N2
        shape: Box
        center: PrimaryTarget
        offset: [0, -0.5]
        box: [0.1, 1]

      - name: N3
        shape: Box
        center: PrimaryTarget
        offset: [0, -0.5]
        box: [0.1, 1]

      - name: N4
        shape: Box
        center: PrimaryTarget
        offset: [0, -0.5]
        box: [0.1, 1]

      - name: E-N1
        shape: Single
        center: PrimaryTarget

  - name: aim
    params:
      bullets: Number of bullets to fire. Default is maximum number of bullets. Must be between 1 and 6.
      hold: 0 for Physical Aimed Shot, 1 for Fully-Charged Aimed Shot (default).
      travel: Projectile travel time. Default 10 frames.
      weakspot: Hit weakspot with aimed shot. Default 0 (false), 1 for true.
    hitbox:
      - name: Aim
        shape: Box
        center: PrimaryTarget
        offset: [0, -0.5]
        box: [0.1, 1]

      - name: Aim-Head
        shape: Box
        center: PrimaryTarget
        offset: [0, -0.5]
        box: [0.1, 1]
        hitlag: {time: 0.12, scale: 0.01, deployable: true}

      - name: FullAim
        shape: Box
        center: PrimaryTarget
        offset: [0, -0.5]
        box: [0.1, 1]

      - name: FullAim-Head
        shape: Box
        center: PrimaryTarget
        offset: [0, -0.5]
        box: [0.1, 1]
        hitlag: {time: 0.12, scale: 0.01, deployable: true}

      - name: E-Aimed
        note: Target aquisition range is not implemented.
        shape: Single
        center: PrimaryTarget

  - name: plunge
    hitbox:
      - name: Low_Plunge
        shape: Circle
        center: Player
        radius: 3

  - name: low_plunge
    note: Must have just exited Nightsoul Blessing
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: skill
    hitbox:
      - name: E
        shape: Circle
        center: Player
        radius: 5.5

  - name: burst
    hitbox:
      - name: Q-Initial
        shape: Circle
        center: PrimaryTarget
        radius: 6

      - name: Q-SoulseekerShell
        shape: Single
        center: PrimaryTarget

  - name: cons
    hitbox:
      - name: C2
        shape: Circle
        center: PrimaryTarget
        radius: 5

      - name: C4
        note: This is an approximation because we do not actually know the real AoE. Based on C2 position.
        shape: Circle
        center: PrimaryTarget
        radius: 5
