use: pipeline
kind: character
name: chasca

override:
  icd_group:
    ChascaBurst:
      damage: [1, 1, 1, 1, 1, 1]
      durability: [1, 0, 1, 0, 1, 0]
      timer: 1.5
    ChascaShadowhunt:
      damage: [1, 1]
      durability: [1, 0]
      timer: 1.5
    ChascaShining:
      damage: [1, 1, 1, 1, 1, 1]
      durability: [1, 0, 1, 0, 1, 0]
      timer: 1.5
    ChascaTap:
      damage: [1, 1]
      durability: [1, 0]
      timer: 1.5

combat:
  icd_tags:
    - ChascaBurst
    - ChascaShadowhunt
    - ChascaShining
    - ChascaTap
  icd_groups:
    - ChascaBurst
    - ChascaShadowhunt
    - ChascaShining
    - ChascaTap

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - attack(4-Hit DMG)
  - aim: attack(Aimed Shot)
  - fullAim: attack(Fully-Charged Aimed Shot)
  - plunge: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)

  - skillResonance: skill(Resonance DMG)
  - skillNA: skill(Multitarget Fire Tap DMG)
  - skillShadowhunt: skill(Shadowhunt Shell DMG)
  - skillShining: skill(Shining Shadowhunt Shell DMG)

  - burstGalesplitting: burst(Galesplitting Soulseeker Shell DMG)
  - burstSoulseeker: burst(Soulseeker Shell DMG)
  - burstRadiant: burst(Radiant Soulseeker Shell DMG)

