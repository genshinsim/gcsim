use: pipeline
kind: character
name: kamisatoayaka

shortcuts:
  - ayaka

combat:
  icd_groups:
    - AyakaExtraAttack

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - - attack(4-Hit DMG)
        - attack(4-Hit DMG)
        - attack(4-Hit DMG)
      - attack(5-Hit DMG)
  - ca: attack(Charged Attack DMG)
  - collision: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)

  - skill: skill(Skill DMG)

  - burstCut: burst(Cutting DMG)
  - burstBloom: burst(Bloom DMG)

