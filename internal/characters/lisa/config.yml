use: pipeline
kind: character
name: lisa

combat:
  icd_tags:
    - LisaElectro

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - attack(4-Hit DMG)
  - charge: attack(Charged Attack DMG)
  - collision: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)

  - skillHold:
      - skill(Non-Conductive Hold DMG)
      - skill(Stack 1 Conductive Hold DMG)
      - skill(Stack 2 Conductive Hold DMG)
      - skill(Stack 3 Conductive Hold DMG)
  - skillPress: skill(Press DMG)

  - burst: burst(Discharge DMG)

docs:
  frames:
    - count: https://docs.google.com/spreadsheets/d/1KRt6I_c5qeUQVXcHv7ZOZKdqjn4Z_VN1OyVFvhDumOc/edit?usp=sharing
      count_credit: Kolibri#7675
      video: https://youtu.be/f58tVgt3OYw
      video_credit: ArchedNosi#1484
    - count: https://docs.google.com/spreadsheets/d/1FDKj16LAEyy0gBef_1SZovg8y9h2PksvStrj7w5U6qM/edit?usp=sharing
      count_credit: archednosi
      video: https://youtu.be/m_gLie94m-E
      video_credit: archednosi
    - count: https://docs.google.com/spreadsheets/d/1FDKj16LAEyy0gBef_1SZovg8y9h2PksvStrj7w5U6qM/edit?usp=sharing
      count_credit: archednosi
      video: https://youtu.be/gbRypU0JDZQ
      video_credit: archednosi

abilities:
  - name: attack
    hitbox:
      - name: N1
        shape: Circle
        center: PrimaryTarget
        radius: 1

      - name: N2
        shape: Circle
        center: PrimaryTarget
        radius: 1

      - name: N3
        shape: Circle
        center: PrimaryTarget
        radius: 1

      - name: N4
        shape: Circle
        center: PrimaryTarget
        radius: 1

  - name: charge
    hitbox:
      - name: CA
        shape: Circle
        center: Player
        offset: [0, 1]
        fan_angle: 40
        radius: 10

  - name: plunge
    hitbox:
      - name: Plunge
        shape: Circle
        center: Player
        radius: 1.5

      - name: Low_Plunge
        shape: Circle
        center: Player
        radius: 3

      - name: High_Plunge
        shape: Circle
        center: Player
        radius: 3.5

  - name: low_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: high_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: skill
    params:
      hold: 0 for Tap (default), 1 for Hold.
    hitbox:
      - name: E-Tap
        shape: Circle
        center: PrimaryTarget
        radius: 1

      - name: E-Hold
        note: Spawns on all enemies within 10m radius of Player.
        shape: Circle
        center: GlobalValue
        radius: 0.2

  - name: burst
    hitbox:
      - name: Q-BeginningAttack
        shape: Circle
        center: Player
        radius: 7

      - name: Q-Discharge
        note: 'At every tick: Below C4: spawn 1 attack at a random enemy in the burst area (7m radius around Player). At C4+: Select up to 3 entities (enemy > gadget). 1 entity: spawn 1 attack at that entity. 2 entities: 16% / 60% (first tick only) chance to spawn 2 attacks, 1 attack otherwise. 3 entities: 50% chance to spawn 2 attacks, 1 otherwise if first tick or 3 attacks were spawned in the previous tick. Otherwise 25%/50%/25% split between 1/2/3 attacks.'
        shape: Circle
        center: GlobalValue
        radius: 1

  - name: walk
    note: No action followed by walk (except low_plunge and high_plunge) has proper frames.
