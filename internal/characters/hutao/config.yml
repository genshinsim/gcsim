use: pipeline
kind: character
name: hutao

shortcuts:
  - ht
  - tao

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - attack(4-Hit DMG)
      - - attack(5-Hit DMG)
        - attack(5-Hit DMG|1)
      - attack(6-Hit DMG)
  - charge: attack(Charged Attack)
  - collision: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)

  - ppatk: skill(ATK Increase)
  - bb: skill(Blood Blossom DMG)

  - burst: burst(Skill DMG)
  - burstLow: burst(Low HP Skill DMG)
  - regen: burst(Skill HP Regeneration)
  - regenLow: burst(Low HP Skill Regeneration)

