use: pipeline
kind: character
name: kamisatoayato

shortcuts:
  - ayato

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - - attack(4-Hit DMG)
        - attack(4-Hit DMG)
      - attack(5-Hit DMG)
  - ca: attack(Charged Attack DMG)
  - collision: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)

  - shunsuiken:
      - skill(Shunsuiken 1-Hit DMG)
      - skill(Shunsuiken 2-Hit DMG)
      - skill(Shunsuiken 3-Hit DMG)
  - skillpp: skill(Namisen DMG Bonus)
  - skill: skill(Water Illusion DMG)

  - burst: burst(Bloomwater Blade DMG)
  - burstatkp: burst(Normal Attack DMG Bonus)

