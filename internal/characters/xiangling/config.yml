use: pipeline
kind: character
name: xiangling

shortcuts:
  - xl

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - - attack(3-Hit DMG)
        - attack(3-Hit DMG)
      - - attack(4-Hit DMG)
        - attack(4-Hit DMG)
        - attack(4-Hit DMG)
        - attack(4-Hit DMG)
      - attack(5-Hit DMG)
  - nc: attack(Charged Attack DMG)
  - collision: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)

  - guobaTick: skill(Flame DMG)

  - pyronadoInitial:
      - burst(1-Hit Swing DMG)
      - burst(2-Hit Swing DMG)
      - burst(3-Hit Swing DMG)
  - pyronadoSpin: burst(Pyronado DMG)

docs:
  frames:
