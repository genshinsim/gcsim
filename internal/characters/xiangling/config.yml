abilities:
  - name: attack
    hitbox:
      - name: N1
        shape: Box
        center: Player
        box: [1.2, 3]
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: N2
        shape: Box
        center: Player
        box: [1.6, 3.3]
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: N3-1
        shape: Box
        center: Player
        box: [1.6, 3.3]
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: N3-2
        shape: Box
        center: Player
        box: [1.2, 3.3]
        hitlag: {scale: 0.01, defense_halt: true}

      - name: N4-1
        shape: Box
        center: Player
        box: [1.2, 3.3]
        hitlag: {scale: 0.01, defense_halt: true}

      - name: N4-2
        shape: Box
        center: Player
        box: [1.2, 3.3]
        hitlag: {scale: 0.01, defense_halt: true}

      - name: N4-3
        shape: Box
        center: Player
        box: [1.2, 3.3]
        hitlag: {scale: 0.01, defense_halt: true}

      - name: N4-4
        shape: Box
        center: Player
        box: [1.2, 3.3]
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: N5
        shape: Box
        center: Player
        box: [1.6, 3.3]
        hitlag: {time: 0.09, scale: 0.01, defense_halt: true}

  - name: charge
    note: Need to use attack right before charge.
    hitbox:
      - name: CA
        shape: Circle
        center: PrimaryTarget
        radius: 0.8
        hitlag: {scale: 0.01, defense_halt: true, deployable: true}

  - name: plunge
    hitbox:
      - name: Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 1

      - name: Low_Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 3

      - name: High_Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 5

  - name: low_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: high_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: skill
    params:
      a4_delay: Number of frames until the active character picks up the Chili Pepper (A4) relative to Guoba Expiry. A negative value indicates that it is not picked up. Default -1, maximum 600.
    hitbox:
      - name: E-Flame
        shape: Circle
        center: Player
        fan_angle: 60
        radius: 5

      - name: E-Flame-A1
        shape: Circle
        center: Player
        fan_angle: 60
        radius: 6

  - name: burst
    hitbox:
      - name: Q-Hit-1
        shape: Circle
        center: Player
        radius: 2.5
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: Q-Hit-2
        shape: Circle
        center: Player
        radius: 2.5
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: Q-Hit-3
        shape: Circle
        center: Player
        radius: 3
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: Q-Pyronado
        note: Pyronado mechanics (collision) are not properly implemented yet.
        shape: Circle
        center: Player
        radius: 2.5

  - name: cons
    hitbox:
      - name: C2
        note: Spawns on target marked for explosion.
        shape: Circle
        center: GlobalValue
        radius: 2

  - name: walk
    note: No action followed by walk (except low_plunge and high_plunge) has proper frames.
