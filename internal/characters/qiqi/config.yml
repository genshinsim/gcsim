abilities:
  - name: attack
    hitbox:
      - name: N1
        shape: Circle
        center: Player
        offset: [0, 0.8]
        radius: 1.2
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: N2
        shape: Box
        center: Player
        box: [1.4, 2.2]
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: N3-1
        shape: Circle
        center: Player
        offset: [0, 1]
        fan_angle: 30
        radius: 1.6
        hitlag: {time: 0.03, scale: 0.05, defense_halt: true}

      - name: N3-2
        shape: Circle
        center: Player
        offset: [0, 0.6]
        radius: 1.6
        hitlag: {time: 0.03, scale: 0.05, defense_halt: true}

      - name: N4-1
        shape: Circle
        center: Player
        offset: [0, 0.6]
        radius: 1.6
        hitlag: {time: 0.03, scale: 0.05, defense_halt: true}

      - name: N4-2
        shape: Circle
        center: Player
        offset: [0, 0.6]
        radius: 1.6
        hitlag: {time: 0.03, scale: 0.05, defense_halt: true}

      - name: N5
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 2.2
        hitlag: {time: 0.12, scale: 0.01, defense_halt: true}

  - name: charge
    note: Need to use attack right before charge.
    hitbox:
      - name: CA-1
        shape: Circle
        center: Player
        offset: [0, 0.5]
        radius: 2

      - name: CA-2
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 2.8

  - name: plunge
    hitbox:
      - name: Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 1

      - name: Low_Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 3

      - name: High_Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 5

  - name: low_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: high_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: skill
    hitbox:
      - name: E-Skill
        shape: Circle
        center: Player
        radius: 2.5
        hitlag: {time: 0.05, scale: 0.05, defense_halt: true}

      - name: E-HeraldOfFrost
        shape: Circle
        center: Player
        radius: 2.5
        hitlag: {time: 0.05, scale: 0.05, defense_halt: true, deployable: true}

  - name: burst
    hitbox:
      - name: Q-ElementalBurst
        shape: Circle
        center: Player
        radius: 7

  - name: walk
    note: No action followed by walk (except low_plunge and high_plunge) has proper frames.
