use: pipeline
kind: character
name: qiqi

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - - attack(3-Hit DMG)
        - attack(3-Hit DMG)
      - - attack(4-Hit DMG)
        - attack(4-Hit DMG)
      - attack(5-Hit DMG)
  - charge:
      - attack(Charged Attack DMG)
      - attack(Charged Attack DMG)
  - collision: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)

  - skillHealOnHitPer: skill(Regeneration on Hit)
  - skillHealOnHitFlat: skill(Regeneration on Hit|1)
  - skillHealContPer: skill(Continuous Regeneration)
  - skillHealContFlat: skill(Continuous Regeneration|1)
  - skillDmgCont: skill(Herald of Frost DMG)
  - skillInitialDmg: skill(Skill DMG)

  - burstHealPer: burst(Healing)
  - burstHealFlat: burst(Healing|1)
  - burstDmg: burst(Skill DMG)

