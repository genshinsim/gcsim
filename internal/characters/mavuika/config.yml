abilities:
  - name: attack
    hitbox:
      - name: N1
        shape: Circle
        center: Player
        offset: [0, 0.5]
        radius: 2.2
        hitlag: {time: 0.09, scale: 0.01, defense_halt: true}

      - name: N2
        shape: Box
        center: Player
        offset: [0, -1.3]
        box: [3.3, 4.3]
        hitlag: {time: 0.05, scale: 0.01, defense_halt: true}

      - name: N3
        shape: Box
        center: Player
        offset: [0, 0.5]
        box: [2.8, 5]

      - name: N4
        shape: Circle
        center: Player
        offset: [0, -0.8]
        radius: 3.2
        hitlag: {time: 0.1, scale: 0.01, defense_halt: true}

      - name: N1-Flamestrider
        shape: Circle
        center: Player
        offset: [0, 1.5]
        radius: 3.2
        hitlag: {time: 0.09, scale: 0.01, defense_halt: true}

      - name: N2-Flamestrider
        shape: Circle
        center: Player
        offset: [0, 1.85]
        radius: 3.5
        hitlag: {time: 0.08, scale: 0.01, defense_halt: true}

      - name: N3-Flamestrider
        shape: Circle
        center: Player
        offset: [0, 0.5]
        radius: 3
        hitlag: {time: 0.04, scale: 0.01, defense_halt: true}

      - name: N4-Flamestrider
        shape: Box
        center: Player
        offset: [0, -0.8]
        box: [3.5, 4.5]
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: N5-Flamestrider
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 4

      - name: Q-N1-Flamestrider
        shape: Circle
        center: Player
        offset: [0, 1.5]
        radius: 3.7
        hitlag: {time: 0.09, scale: 0.01, defense_halt: true}

      - name: Q-N2-Flamestrider
        shape: Circle
        center: Player
        offset: [0, 1.85]
        radius: 4
        hitlag: {time: 0.08, scale: 0.01, defense_halt: true}

      - name: Q-N3-Flamestrider
        shape: Circle
        center: Player
        offset: [0, 0.5]
        radius: 3.7
        hitlag: {time: 0.04, scale: 0.01, defense_halt: true}

      - name: Q-N4-Flamestrider
        shape: Box
        center: Player
        offset: [0, -0.8]
        box: [4.5, 5.5]
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: Q-N5-Flamestrider
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 4.7

  - name: charge
    params:
      buffered: Number of frames to buffer CA. Range 0-15, lower values can be used to trigger certain N0 abilities.
      final: Used to explicitly initiate the Flamestrider's final hit of the charge attack.
      hold: Number of frames to extend Charge Attack by. Min 1, max 45, can only be used after a Charge attack has started.
    hitbox:
      - name: CA
        shape: Circle
        center: Player
        offset: [0, 0.3]
        radius: 3.3
        hitlag: {time: 0.15, scale: 0.01, defense_halt: true}

      - name: CA-Flamestrider-Cyclic
        note: This is an approximation because we do not actually know the real AoE. This is a moving hitbox. It moves at varying speeds in a circle of radius 4.0m around the player with a hitbox radius of 3.0m.
        shape: Single
        center: GlobalValue

      - name: CA-Flamestrider-Final
        shape: Circle
        center: Player
        offset: [0, 2]
        radius: 4
        hitlag: {time: 0.04, scale: 0.01, defense_halt: true}

      - name: Q-CA-Flamestrider-Final
        shape: Circle
        center: Player
        offset: [0, 2]
        radius: 4.5
        hitlag: {time: 0.04, scale: 0.01, defense_halt: true}

  - name: plunge
    hitbox:
      - name: Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 1

      - name: Low_Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 3

      - name: High_Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 5

      - name: Low_Plunge-Flamestrider
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 3

      - name: High_Plunge-Flamestrider
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 5

  - name: low_plunge
    note: Previous action must be a walking Flamestrider jump or jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg. Flamestrider plunge has no collision.

  - name: high_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg. Flamestrider plunge has no collision.

  - name: skill
    params:
      hold: 0 for Tap (default), 1 for Hold.
      recast: 0 to use E (default), 1 to use Recast E. Recast E is only possible if Nightsoul Blessing is active and Recast E is not on cooldown.
    hitbox:
      - name: E-Tap
        shape: Circle
        center: Player
        offset: [0, 0.5]
        radius: 5

      - name: E-Hold
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 6

      - name: E-Flamestrider-Refresh
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 6

      - name: E-Ring
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 6

  - name: burst
    hitbox:
      - name: Q-Initial
        shape: Circle
        center: Player
        offset: [0, 2.5]
        radius: 7

  - name: cons
    hitbox:
      - name: C6-Flamestrider
        note: Spawns on target that C6 proc'd on.
        shape: Circle
        center: GlobalValue
        radius: 6

      - name: C6-Ring
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 6

  - name: dash
    hitbox:
      - name: Dash
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 1.2
