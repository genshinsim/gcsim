talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - attack(4-Hit DMG)
  - charge: attack(Charged Attack DMG)
  - collision: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)

  - skill: skill(Skill DMG)
  - skillRing: skill(Ring of Searing Radiance DMG)
  - skillAttack:
      - skill(Flamestrider Normal Attack 1-Hit DMG)
      - skill(Flamestrider Normal Attack 2-Hit DMG)
      - skill(Flamestrider Normal Attack 3-Hit DMG)
      - skill(Flamestrider Normal Attack 4-Hit DMG)
      - skill(Flamestrider Normal Attack 5-Hit DMG)
  - skillDash: skill(Flamestrider Sprint DMG)
  - skillCharge: skill(Flamestrider Charged Attack Cyclic DMG)
  - skillChargeFinal: skill(Flamestrider Charged Attack Final DMG)
  - skillPlunge: skill(Flamestrider Plunge DMG)

  - burst: burst(Skill DMG)
  - burstQBonus: burst(Sunfell Slice DMG Bonus)
  - burstNABonus: burst(Flamestrider Normal Attack DMG Bonus)
  - burstCABonus: burst(Flamestrider Charged Attack DMG Bonus)

