use: pipeline
kind: character
name: navia

override:
  icd_group:
    NaviaBurst:
      name: Avatar_Navia_Burst

shortcuts:
  - demoiselle

combat:
  icd_groups:
    - NaviaBurst

talents:
  - auto:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - - attack(3-Hit DMG)
        - attack(3-Hit DMG)
        - attack(3-Hit DMG)
      - attack(4-Hit DMG)
  - collision: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)

  - skillshotgun: skill(Rosula Shardshot Base DMG)
  - skillblade: skill(Surging Blade DMG)

  - burst:
      - burst(Skill DMG)
      - burst(Cannon Fire Support DMG)

