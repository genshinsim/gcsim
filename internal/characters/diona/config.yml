use: pipeline
kind: character
name: diona

talents:
  - auto:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - attack(4-Hit DMG)
      - attack(5-Hit DMG)
  - aim: attack(Aimed Shot)
  - fullaim: attack(Fully-Charged Aimed Shot)

  - paw: skill(Icy Paw DMG)
  - pawShieldPer: skill(Base Shield DMG Absorption)
  - pawShieldFlat: skill(Base Shield DMG Absorption|1)
  - pawDur: skill(Duration)

  - burst: burst(Skill DMG)
  - burstDot: burst(Continuous Field DMG)
  - burstHealPer: burst(HP Regeneration Over Time)
  - burstHealFlat: burst(HP Regeneration Over Time|1)

docs:
  frames:
