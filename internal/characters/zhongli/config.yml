use: pipeline
kind: character
name: zhongli

shortcuts:
  - zhong
  - zl

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - attack(4-Hit DMG)
      - attack(5-Hit DMG)
      - attack(6-Hit DMG)
  - charge: attack(Charged Attack DMG)

  - skill: skill(Stone Stele/Resonance DMG)
  - skillTick: skill(Stone Stele/Resonance DMG|1)
  - skillHold: skill(Hold DMG)
  - shieldBase: skill(Shield Base Absorption)
  - shieldPer: skill(Additional Shield Absorption)

  - burst: burst(Skill DMG)

docs:
  fields:
    .zhongli.shielded: Evaluates to 1 if player is currently shielded
  frames:
