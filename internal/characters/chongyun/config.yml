use: pipeline
kind: character
name: chongyun

shortcuts:
  - chong

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - attack(4-Hit DMG)
  - collision: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)

  - skill: skill(Skill DMG)
  - infuseDur: skill(Infusion Duration)

  - burst: burst(Skill DMG)

docs:
  frames:
    - count: https://docs.google.com/spreadsheets/d/13TsDRmuHCrXBKlka-huhKt1xtjNHhLEZIuJJzj1OQvg/edit?usp=sharing
      count_credit: Kolibri#7675
      video: https://youtu.be/BjgV0LkDUpA
      video_credit: Kolibri#7675
    - count: https://docs.google.com/spreadsheets/d/1ieBa344vhM42FvxmlZLMSzlGm5PEykV8VMGQk9Haelk/edit?usp=sharing
      count_credit: GaspNAwe
      video: https://youtu.be/FJ8SftoAoAQ
      video_credit: GaspNAwe

abilities:
  - name: attack
    hitbox:
      - name: N1
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 2
        hitlag: {time: 0.1, scale: 0.01, defense_halt: true}

      - name: N2
        shape: Circle
        center: Player
        offset: [0, 1]
        fan_angle: 270
        radius: 2
        hitlag: {time: 0.09, scale: 0.01, defense_halt: true}

      - name: N3
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 2
        hitlag: {time: 0.12, scale: 0.01, defense_halt: true}

      - name: N4
        shape: Box
        center: Player
        offset: [0, -0.5]
        box: [2, 3]
        hitlag: {time: 0.12, scale: 0.01, defense_halt: true}

  - name: charge
    hitbox:
      - name: CA-Spinning
        note: not implemented yet
        shape: Circle
        center: Player
        offset: [0, 0.3]
        radius: 3
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true, deployable: true}

      - name: CA-Final
        note: not implemented yet
        shape: Circle
        center: Player
        radius: 3.5
        hitlag: {time: 0.15, scale: 0.01, defense_halt: true, deployable: true}

  - name: plunge
    hitbox:
      - name: Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 1

      - name: Low_Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 3

      - name: High_Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 5

  - name: low_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: high_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: skill
    hitbox:
      - name: E-Skill
        note: E has a detection area of 8m around the position of this hitbox.
        shape: Circle
        center: Player
        offset: [0, 1.5]
        radius: 2.5
        hitlag: {time: 0.09, scale: 0.01}

  - name: burst
    hitbox:
      - name: Q-ElementalBurst
        shape: Circle
        center: PrimaryTarget
        radius: 3.5

  - name: asc
    hitbox:
      - name: E-A4
        note: Spawns at the closest enemy to the E detection area center or at that center if no such enemy exists.
        shape: Circle
        center: GlobalValue
        radius: 3.5

  - name: cons
    hitbox:
      - name: Q-C6
        shape: Circle
        center: PrimaryTarget
        radius: 3.5

      - name: C1
        shape: Circle
        center: PrimaryTarget
        radius: 1

  - name: walk
    note: No action followed by walk (except low_plunge and high_plunge) has proper frames.
