use: pipeline
kind: character
name: kujousara

shortcuts:
  - kujosara
  - sara

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - attack(4-Hit DMG)
      - attack(5-Hit DMG)
  - aim: attack(Aimed Shot)
  - fullaim: attack(Fully-Charged Aimed Shot)

  - skill: 'skill(Tengu Juurai: Ambush DMG)'
  - atkBuff: skill(ATK Bonus Ratio)

  - burstMain: 'burst(Tengu Juurai: Titanbreaker DMG)'
  - burstCluster: 'burst(Tengu Juurai: Stormcluster DMG)'

docs:
  frames:
    - count: https://docs.google.com/spreadsheets/d/1B29Zceb_pl8FYfHtIrZeMttZtovmwE8tHEZud_kkbmo/edit?usp=sharing
      count_credit: Kolibri#7675
