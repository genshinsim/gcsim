abilities:
  - name: attack
    hitbox:
      - name: N1
        shape: Circle
        center: PrimaryTarget
        radius: 1

      - name: N2
        shape: Circle
        center: PrimaryTarget
        radius: 1

      - name: N3
        shape: Circle
        center: PrimaryTarget
        radius: 1

      - name: N4
        shape: Circle
        center: PrimaryTarget
        radius: 2

  - name: charge
    hitbox:
      - name: CA
        shape: Circle
        center: PrimaryTarget
        radius: 3

  - name: skill
    params:
      hold: 0 for Tap (default), 1 for Hold.
    hitbox:
      - name: E-DoT
        note: Spawns at phantom position which was spawned on Player.
        shape: Circle
        center: GlobalValue
        radius: 5

      - name: E-Explosion
        note: Spawns at phantom position which was spawned on Player.
        shape: Circle
        center: GlobalValue
        radius: 5

  - name: burst
    hitbox:
      - name: Q-Bubble
        note: 0 damage attack that breaks bubble if not already broken has the same hitbox.
        shape: Circle
        center: Player
        radius: 10

      - name: Q-Bubble-Explosion
        note: Spawns on the target that the Bubble burst on.
        shape: Circle
        center: GlobalValue
        radius: 1

  - name: asc
    hitbox:
      - name: A1
        note: Spawns at phantom position which was spawned on Player.
        shape: Circle
        center: Player
        radius: 5

  - name: cons
    hitbox:
      - name: CA-C2
        note: Spawns on target that C2 proc'd on.
        shape: Circle
        center: GlobalValue
        radius: 3

  - name: dash
    params:
      f: Number of frames to add to minimum dash length. Default 0 frames.
    hitbox:
      - name: Dash
        shape: Circle
        center: Player
        offset: [0, 0.1]
        radius: 2

  - name: walk
    note: No action followed by walk has proper frames.
