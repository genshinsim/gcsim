name: mona

combat:
  icd_tags:
    - MonaWaterDamage

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - attack(4-Hit DMG)
  - charge: attack(Charged Attack DMG)

  - skillDot: skill(DoT)
  - skill: skill(Explosion DMG)

  - explosion: burst(Illusory Bubble Explosion DMG)
  - omenDuration: burst(Omen Duration)
  - dmgBonus: burst(DMG Bonus)

