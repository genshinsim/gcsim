abilities:
  - name: attack
    hitbox:
      - name: N1
        shape: Box
        center: Player
        offset: [0, -0.2]
        box: [2.5, 2.5]
        hitlag: {defense_halt: true}

      - name: N2
        shape: Box
        center: Player
        offset: [0, -0.2]
        box: [2.8, 3.5]
        hitlag: {defense_halt: true}

      - name: N3
        shape: Circle
        center: Player
        radius: 2.5
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: Fiery-N1
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 2.5
        hitlag: {time: 0.01, scale: 0.03, defense_halt: true}

      - name: Fiery-N2
        shape: Box
        center: Player
        offset: [0, -0.5]
        box: [4, 4]
        hitlag: {time: 0.01, scale: 0.03, defense_halt: true}

      - name: Fiery-N3
        shape: Box
        center: Player
        offset: [0, -0.5]
        box: [4, 4.5]
        hitlag: {time: 0.01, scale: 0.03, defense_halt: true}

  - name: charge
    hitbox:
      - name: CA
        shape: Circle
        center: Player
        offset: [0, 0.7]
        radius: 3.5
        hitlag: {time: 0.01, scale: 0.03, defense_halt: true}

      - name: Fiery-CA
        shape: Circle
        center: Player
        offset: [0, 0.7]
        radius: 3.5
        hitlag: {time: 0.01, scale: 0.03, defense_halt: true}

  - name: plunge
    hitbox:
      - name: Plunge
        shape: Circle
        center: Player
        radius: 1

      - name: High_Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 5

  - name: low_plunge
    note: Previous action must be jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: high_plunge
    note: Previous action must be charge or jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: skill
    note: Hold skill is not implemented.
    hitbox:
      - name: E
        note: This is an approximation because we do not actually know the real AoE.
        shape: Box
        center: PrimaryTarget
        box: [0.1, 2]
        hitlag: {scale: 0.1, defense_halt: true}

      - name: Fiery-E
        note: This is an approximation because we do not actually know the real AoE.
        shape: Box
        center: PrimaryTarget
        box: [0.1, 2]

  - name: burst
    hitbox:
      - name: Q
        shape: Circle
        center: PrimaryTarget
        offset: [0, 1]
        radius: 7.5

      - name: Fiery-Q
        shape: Circle
        center: PrimaryTarget
        offset: [0, 1]
        radius: 7.5

      - name: Q-Volcano-Kablam
        shape: Circle
        center: PrimaryTarget
        offset: [0, 1]
        radius: 7.5
