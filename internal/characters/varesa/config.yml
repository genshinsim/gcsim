use: pipeline
kind: character
name: varesa

combat:
  icd_tags:
    - VaresaCombatCycle

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
  - charged: attack(Charged Attack DMG)
  - collision: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)
  - fieryAttack:
      - attack(Fiery Passion 1-Hit DMG)
      - attack(Fiery Passion 2-Hit DMG)
      - attack(Fiery Passion 3-Hit DMG)
  - fieryCharged: attack(Fiery Passion Charged Attack DMG)
  - fieryCollision: attack(Fiery Passion Plunge DMG)
  - fieryLowPlunge: attack(Fiery Passion Low/High Plunge DMG)
  - fieryHighPlunge: attack(Fiery Passion Low/High Plunge DMG|1)

  - rush: skill(Rush DMG)
  - fieryRush: skill(Fiery Passion Rush DMG)

  - kick: burst(Flying Kick DMG)
  - fieryKick: burst(Fiery Passion Flying Kick DMG)
  - kablam: burst(Volcano Kablam DMG)

