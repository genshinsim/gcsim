abilities:
  - name: attack
    hitbox:
      - name: N1
        shape: Circle
        center: PrimaryTarget
        radius: 1

      - name: N2
        shape: Circle
        center: PrimaryTarget
        radius: 1

      - name: N3
        shape: Circle
        center: PrimaryTarget
        radius: 1

      - name: N4
        shape: Circle
        center: PrimaryTarget
        radius: 2

  - name: charge
    hitbox:
      - name: CA
        shape: Box
        center: Player
        offset: [0, -0.2]
        box: [3.2, 7.5]

  - name: plunge
    hitbox:
      - name: Plunge
        shape: Circle
        center: Player
        radius: 1.5

      - name: Low_Plunge
        shape: Circle
        center: Player
        radius: 3

      - name: High_Plunge
        shape: Circle
        center: Player
        radius: 3.5

  - name: low_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: high_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: skill
    hitbox:
      - name: E
        shape: Circle
        center: Player
        offset: [0, 5]
        radius: 6

  - name: burst
    hitbox:
      - name: Q-DoT
        shape: Circle
        center: Player
        offset: [0, 5]
        radius: 8

      - name: Q-AdditionalElement
        shape: Circle
        center: Player
        offset: [0, 5]
        radius: 8

      - name: Q-AbsorbCheck
        shape: Box
        center: GlobalValue
        offset: [0, 4]
        box: [2.5, 2.5]
