use: pipeline
kind: character
name: aloy

talents:
  - attack:
      - - attack(1-Hit DMG)
        - attack(1-Hit DMG|1)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - attack(4-Hit DMG)
  - aim: attack(Aimed Shot)
  - fullaim: attack(Fully-Charged Aimed Shot)

  - skillMain: skill(Freeze Bomb DMG)
  - skillBomblets: skill(Chillwater Bomblet DMG)
  - skillAtkDecrease: skill(ATK Decrease)
  - skillCoilNABonus:
      - skill(Coil Normal Attack DMG Bonus)
      - skill(Coil Normal Attack DMG Bonus|1)
      - skill(Coil Normal Attack DMG Bonus|2)
  - skillRushingIceNABonus: skill(Rushing Ice Normal Attack DMG Bonus)

  - burst: burst(Skill DMG)

docs:
  fields:
    .aloy.coil: Current number of coil stacks.
