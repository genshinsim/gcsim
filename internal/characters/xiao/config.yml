use: pipeline
kind: character
name: xiao

override:
  icd_group:
    XiaoDash:
      name: Xiao_DevilDash

combat:
  icd_groups:
    - XiaoDash

talents:
  - attack:
      - - attack(1-Hit DMG)
        - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - - attack(4-Hit DMG)
        - attack(4-Hit DMG)
      - attack(5-Hit DMG)
      - attack(6-Hit DMG)
  - charge: attack(Charged Attack DMG)
  - plunge: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)

  - skill: skill(Skill DMG)

  - burstBonus: burst(Normal/Charged/Plunging Attack DMG Bonus)
  - burstDrain: burst(Life Drain)

