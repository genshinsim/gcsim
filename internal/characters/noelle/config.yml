use: pipeline
kind: character
name: noelle

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - attack(4-Hit DMG)
  - charge: attack(Charged Attack Cyclic DMG)
  - chargeFinal: attack(Charged Attack Final DMG)
  - collision: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)

  - shieldDef: skill(DMG Absorption)
  - shieldHeal: skill(Healing)
  - healChance: skill(Healing Triggering Chance)
  - shieldDmg: skill(Skill DMG)
  - shieldFlat: skill(DMG Absorption|1)
  - shieldHealFlat: skill(Healing|1)

  - burst: burst(Burst DMG)
  - burstskill: burst(Skill DMG)
  - defconv: burst(ATK Bonus)

docs:
  frames:
