use: pipeline
kind: character
name: keqing

shortcuts:
  - keq

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - - attack(4-Hit DMG)
        - attack(4-Hit DMG|1)
      - attack(5-Hit DMG)
  - charge:
      - attack(Charged Attack DMG)
      - attack(Charged Attack DMG|1)
  - collision: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)

  - skill: skill(Lightning Stiletto DMG)
  - skillPress: skill(Slashing DMG)
  - skillCA: skill(Thunderclap Slash DMG)

  - burstInitial: burst(Skill DMG)
  - burstDot: burst(Consecutive Slash DMG)
  - burstFinal: burst(Last Attack DMG)

