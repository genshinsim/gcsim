use: pipeline
kind: character
name: shikanoinheizou

shortcuts:
  - heizou

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - - attack(4-Hit DMG)
        - attack(4-Hit DMG|1)
        - attack(4-Hit DMG|2)
      - attack(5-Hit DMG)
  - charge: attack(Charged Attack)
  - collision: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)

  - skill: skill(Skill DMG)
  - decBonus: skill(Declension DMG Bonus)
  - convicBonus: skill(Conviction DMG Bonus)

  - burst: burst(Fudou Style Vacuum Slugger DMG)
  - burstIris: burst(Windmuster Iris DMG)

docs:
  fields:
    .heizou.declension: Number of Declension stacks.
  frames:
    - count: https://docs.google.com/spreadsheets/d/1SsXniQztelJOBWMYPT-w6wygSFkduWhu2OAVC9IUbbA/edit?usp=sharing
      count_credit: Kolibri#7675
      video: https://youtu.be/CTIsFo_3j2I
      video_credit: Kolibri#7675
    - count: https://docs.google.com/spreadsheets/d/16ZDmEBZOD4xeUcodxFJVuLC7IIqM9LGLilkct65mElg/edit?usp=sharing
      count_credit: kolibri._.
      video: https://youtu.be/0OCu0i3Mq0I
      video_credit: kolibri._.

abilities:
  - name: attack
    hitbox:
      - name: N1
        shape: Box
        center: Player
        offset: [0, -0.2]
        box: [2, 3]
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: N2
        shape: Box
        center: Player
        offset: [0, -0.2]
        box: [2, 3]
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true}

      - name: N3
        shape: Circle
        center: Player
        offset: [0, 1.1]
        radius: 2.2
        hitlag: {time: 0.06, scale: 0.01, defense_halt: true}

      - name: N4-1
        shape: Box
        center: Player
        offset: [0, -0.2]
        box: [2, 3]

      - name: N4-2
        shape: Box
        center: Player
        offset: [0, -0.2]
        box: [2, 3]

      - name: N4-3
        shape: Box
        center: Player
        offset: [0, -0.2]
        box: [2, 3]
        hitlag: {time: 0.09, scale: 0.01, defense_halt: true}

      - name: N5
        shape: Circle
        center: Player
        offset: [0, 1.1]
        radius: 2.4
        hitlag: {time: 0.12, scale: 0.01, defense_halt: true}

  - name: charge
    note: Need to use attack right before charge.
    hitbox:
      - name: CA
        shape: Box
        center: Player
        offset: [0, -1.2]
        box: [2.8, 3.6]
        hitlag: {time: 0.09, scale: 0.01}

  - name: plunge
    hitbox:
      - name: Plunge
        shape: Circle
        center: Player
        radius: 1.5

      - name: Low_Plunge
        shape: Circle
        center: Player
        radius: 3

      - name: High_Plunge
        shape: Circle
        center: Player
        radius: 3.5

  - name: low_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: high_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: skill
    params:
      hold: Hold until max stacks. Default 0 (false), non-zero value for true.
    hitbox:
      - name: E
        shape: Box
        center: Player
        offset: [0, -0.3]
        box: [3, 5]
        hitlag: {time: 0.09, scale: 0.01}

      - name: E-MaxStack
        shape: Box
        center: Player
        offset: [0, -0.3]
        box: [4, 6]
        hitlag: {time: 0.12, scale: 0.01}

  - name: burst
    hitbox:
      - name: Q-Initial
        shape: Circle
        center: PrimaryTarget
        radius: 6

      - name: Q-Iris
        note: Spawns on all enemies hit by Q-Initial.
        shape: Circle
        center: GlobalValue
        radius: 2.5

  - name: walk
    note: No action followed by walk (except low_plunge and high_plunge) has proper frames.
