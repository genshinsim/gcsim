use: pipeline
kind: character
name: diluc

combat:
  icd_groups:
    - Diluc

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - attack(4-Hit DMG)
  - collision: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)

  - skill:
      - skill(1-Hit DMG)
      - skill(2-Hit DMG)
      - skill(3-Hit DMG)

  - burstExplode: burst(Slashing DMG)
  - burstInitial: burst(Slashing DMG)
  - burstDOT: burst(DoT)

