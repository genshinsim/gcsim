abilities:
  - name: attack
    hitbox:
      - name: N1
        shape: Circle
        center: Player
        offset: [0, 0.5]
        fan_angle: 300
        radius: 2
        hitlag: {time: 0.1, scale: 0.01, defense_halt: true}

      - name: N2
        shape: Box
        center: Player
        offset: [0, -1]
        box: [2, 3]
        hitlag: {time: 0.09, scale: 0.01, defense_halt: true}

      - name: N3
        shape: Circle
        center: Player
        offset: [0, 0.5]
        fan_angle: 300
        radius: 2
        hitlag: {time: 0.09, scale: 0.01, defense_halt: true}

      - name: N4
        shape: Box
        center: Player
        offset: [0, -0.5]
        box: [2, 3]
        hitlag: {time: 0.12, scale: 0.01, defense_halt: true}

  - name: charge
    hitbox:
      - name: CA-Spinning
        note: not implemented yet
        shape: Circle
        center: Player
        offset: [0, 0.3]
        radius: 3
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true, deployable: true}

      - name: CA-Final
        note: not implemented yet
        shape: Circle
        center: Player
        radius: 3.5
        hitlag: {time: 0.15, scale: 0.01, defense_halt: true, deployable: true}

  - name: plunge
    hitbox:
      - name: Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 1

      - name: Low_Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 3

      - name: High_Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 5

  - name: low_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: high_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: skill
    hitbox:
      - name: E-1
        shape: Box
        center: Player
        box: [3, 3.5]
        hitlag: {time: 0.12, scale: 0.01, defense_halt: true}

      - name: E-2
        shape: Circle
        center: Player
        offset: [0, 1.2]
        fan_angle: 300
        radius: 2.2
        hitlag: {time: 0.12, scale: 0.01, defense_halt: true}

      - name: E-3
        shape: Box
        center: Player
        offset: [0, -0.3]
        box: [3.5, 4]
        hitlag: {time: 0.16, scale: 0.01, defense_halt: true}

  - name: burst
    hitbox:
      - name: Q-Start
        note: not implemented yet
        shape: Circle
        center: Player
        radius: 6

      - name: Q-Slashing-1
        shape: Box
        center: Player
        offset: [0, -1]
        box: [16, 6]
        hitlag: {time: 0.09, scale: 0.01, defense_halt: true}

      - name: Q-DoT
        note: 'This is a moving hitbox. It moves at 2.8m in Y direction per attack and starts at Y: 1m (pay attention to the offsetY!).'
        shape: Box
        center: Player
        offset: [0, -5]
        box: [16, 8]

      - name: Q-Explosion
        note: 'This is part of a moving hitbox. This hitbox spawns at Y: 1 + 14*1.7 = 24.8m (pay attention to the offsetY!).'
        shape: Box
        center: Player
        offset: [0, -6]
        box: [16, 10]

  - name: walk
    note: No action followed by walk (except low_plunge and high_plunge) has proper frames.
