use: pipeline
kind: character
name: xinyan

talents:
  - attack:
      - attack(1-Hit DMG)
      - attack(2-Hit DMG)
      - attack(3-Hit DMG)
      - attack(4-Hit DMG)
  - collision: attack(Plunge DMG)
  - lowPlunge: attack(Low/High Plunge DMG)
  - highPlunge: attack(Low/High Plunge DMG|1)

  - skill: skill(Swing DMG)
  - shieldLevel1: skill(Shield Level 1 DMG Absorption)
  - shieldLevel1Flat: skill(Shield Level 1 DMG Absorption|1)
  - shieldLevel2: skill(Shield Level 2 DMG Absorption)
  - shieldLevel2Flat: skill(Shield Level 2 DMG Absorption|1)
  - shieldLevel3: skill(Shield Level 3 DMG Absorption)
  - shieldLevel3Flat: skill(Shield Level 3 DMG Absorption|1)
  - skillDot: skill(DoT)

  - burstDmg: burst(Skill DMG)
  - burstDot: burst(Pyro DoT)

docs:
  frames:
    - count: https://docs.google.com/spreadsheets/d/1KtJTGFMlgMutN8buoHUqCkYEULVkPJ6vCHpzb4sdYwY/edit?usp=sharing
      count_credit: Kolibri#7675
      video: https://youtu.be/PT7BQuZAVTE
      video_credit: Kolibri#7675
    - count: https://docs.google.com/spreadsheets/d/1ieBa344vhM42FvxmlZLMSzlGm5PEykV8VMGQk9Haelk/edit?usp=sharing
      count_credit: GaspNAwe
      video: https://youtu.be/KbsIz4GqzHs
      video_credit: GaspNAwe

abilities:
  - name: attack
    hitbox:
      - name: N1
        shape: Circle
        center: Player
        offset: [0, 0.5]
        fan_angle: 270
        radius: 2
        hitlag: {time: 0.1, scale: 0.01, defense_halt: true}

      - name: N2
        shape: Box
        center: Player
        box: [2, 2.5]
        hitlag: {time: 0.1, scale: 0.01, defense_halt: true}

      - name: N3
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 2
        hitlag: {time: 0.12, scale: 0.01, defense_halt: true}

      - name: N4
        shape: Circle
        center: Player
        offset: [0, 1]
        fan_angle: 270
        radius: 2
        hitlag: {time: 0.12, scale: 0.01, defense_halt: true}

  - name: charge
    hitbox:
      - name: CA-Spinning
        note: not implemented yet
        shape: Circle
        center: Player
        offset: [0, 0.3]
        radius: 3
        hitlag: {time: 0.03, scale: 0.01, defense_halt: true, deployable: true}

      - name: CA-Final
        note: not implemented yet
        shape: Circle
        center: Player
        radius: 3.5
        hitlag: {time: 0.15, scale: 0.01, defense_halt: true, deployable: true}

  - name: plunge
    hitbox:
      - name: Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 1

      - name: Low_Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 3

      - name: High_Plunge
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 5

  - name: low_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: high_plunge
    note: Previous action must be a jump buffed via Xianyun's burst for example.
    params:
      collision: 0 for no collision dmg (default), 1 for collision dmg.

  - name: skill
    hitbox:
      - name: E-Swing
        shape: Circle
        center: Player
        offset: [0, 1]
        radius: 3
        hitlag: {time: 0.09, scale: 0.01, defense_halt: true}

      - name: E-DoT
        shape: Circle
        center: Player
        radius: 3

  - name: burst
    hitbox:
      - name: Q-Initial
        shape: Circle
        center: Player
        radius: 3
        hitlag: {defense_halt: true}

      - name: Q-DoT
        shape: Circle
        center: Player
        offset: [0, 2]
        radius: 4

      - name: Q-DoT-1stOnly
        shape: Circle
        center: Player
        offset: [0, 2]
        radius: 4
        hitlag: {defense_halt: true}

  - name: walk
    note: No action followed by walk (except low_plunge and high_plunge) has proper frames.
